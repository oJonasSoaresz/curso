<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Curso</title>
    <style>
        :root { --primary: #5f27cd; --bg: #f1f2f6; }
        body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); }
        .sidebar { width: 300px; background: white; border-right: 1px solid #ddd; overflow-y: auto; }
        .header-side { padding: 20px; background: var(--primary); color: white; }
        .aula-item { padding: 15px; cursor: pointer; border-bottom: 1px solid #eee; transition: 0.3s; }
        .aula-item:hover { background: #f0f7ff; }
        .aula-item.active { border-left: 5px solid var(--primary); background: #f1f2f6; font-weight: bold; }
        .main { flex-grow: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .video-box { width: 100%; max-width: 850px; aspect-ratio: 16/9; background: black; border-radius: 8px; overflow: hidden; }
        iframe, video { width: 100%; height: 100%; }
        .info { width: 100%; max-width: 850px; margin-top: 20px; background: white; padding: 20px; border-radius: 8px; }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="header-side"><h3>Meu Curso</h3></div>
    <div id="lista-aulas">
        <div class="aula-item active" onclick="mudar('14emeHEME7o_c4pn0t1iG8ZQNWDLj1caD', 'Aula 1', 'Introdução ao curso')">1. Boas-vindas</div>
        <div class="aula-item" onclick="mudar('OUTRO_ID', 'Aula 2', 'Configurações')">2. Primeiros Passos</div>
    </div>
</aside>

<main class="main">
    <div class="video-box">
        <iframe id="player" src="" frameborder="0" allowfullscreen></iframe>
    </div>
    <div class="info">
        <h2 id="titulo">Selecione uma aula</h2>
        <p id="desc">Descrição da aula aparecerá aqui.</p>
    </div>
</main>

<script>
function mudar(id, titulo, desc) {
    // Para Google Drive, o link de embed é esse:
    const url = "https://drive.google.com/file/d/" + id + "/preview";
    
    document.getElementById('player').src = url;
    document.getElementById('titulo').innerText = titulo;
    document.getElementById('desc').innerText = desc;

    // Remove classe active
    document.querySelectorAll('.aula-item').forEach(el => el.classList.remove('active'));
    // Adiciona no clicado
    event.currentTarget.classList.add('active');
}
</script>

</body>
</html>
